<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="header-title-group">
        <h1>📋 Kanban Board</h1>
        <p>Drag cards between columns to update status</p>
      </div>
    </div>
    <div class="header-center">
      <input
        type="search"
        id="searchInput"
        class="search-input-board"
        placeholder="🔍 Search tasks..."
        autocomplete="off"
      />
    </div>
    <div class="header-right">
      <button class="btn-add" id="addTaskBtn">+ Add Task</button>
      <a href="/index.html" class="back-to-main">← InsightSerenity</a>
    </div>
  </header>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All Priorities</button>
    <button class="filter-btn" data-filter="high">🔴 High</button>
    <button class="filter-btn" data-filter="medium">🟡 Medium</button>
    <button class="filter-btn" data-filter="low">🟢 Low</button>
  </div>

  <!-- Stats Bar -->
  <div class="board-stats-bar">
    <span class="board-stat-item" id="statTotal">Total Tasks 0</span>
    <span class="board-stat-sep">|</span>
    <span class="board-stat-item" id="statCompletion">Completion 0%</span>
    <span class="board-stat-sep">|</span>
    <span class="board-stat-item overdue-stat" id="statOverdue">Overdue 0</span>
  </div>

  <!-- Board -->
  <div class="board">
    <div class="column" id="col-backlog" data-col="backlog">
      <div class="col-header">
        <div class="col-title">
          <div class="col-dot" style="background:#94a3b8"></div>
          Backlog
          <span class="col-count" id="count-backlog">0</span>
        </div>
        <button class="col-add col-add-btn" data-col="backlog" title="Add task">+</button>
      </div>
      <div class="card-list" id="list-backlog"></div>
    </div>

    <div class="column" id="col-inprogress" data-col="inprogress">
      <div class="col-header">
        <div class="col-title">
          <div class="col-dot" style="background:#60a5fa"></div>
          In Progress
          <span class="col-count" id="count-inprogress">0</span>
        </div>
        <button class="col-add col-add-btn" data-col="inprogress" title="Add task">+</button>
      </div>
      <div class="card-list" id="list-inprogress"></div>
    </div>

    <div class="column" id="col-review" data-col="review">
      <div class="col-header">
        <div class="col-title">
          <div class="col-dot" style="background:#ffc451"></div>
          Review
          <span class="col-count" id="count-review">0</span>
        </div>
        <button class="col-add col-add-btn" data-col="review" title="Add task">+</button>
      </div>
      <div class="card-list" id="list-review"></div>
    </div>

    <div class="column" id="col-done" data-col="done">
      <div class="col-header">
        <div class="col-title">
          <div class="col-dot" style="background:#34d399"></div>
          Done
          <span class="col-count" id="count-done">0</span>
        </div>
        <button class="col-add col-add-btn" data-col="done" title="Add task">+</button>
      </div>
      <div class="card-list" id="list-done"></div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Task</h2>
        <button class="modal-close" id="modalCloseBtn">✕</button>
      </div>

      <div class="form-group">
        <label for="taskTitle">Title *</label>
        <input type="text" id="taskTitle" placeholder="e.g. Design new landing page" />
      </div>
      <div class="form-group">
        <label for="taskDesc">Description</label>
        <textarea id="taskDesc" placeholder="Brief description of the task..."></textarea>
      </div>
      <div class="form-group">
        <label for="taskPriority">Priority</label>
        <select id="taskPriority">
          <option value="high">🔴 High</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
      <div class="form-group">
        <label for="taskCol">Column</label>
        <select id="taskCol">
          <option value="backlog">Backlog</option>
          <option value="inprogress">In Progress</option>
          <option value="review">Review</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="form-group">
        <label for="taskDueDate">Due Date</label>
        <input type="date" id="taskDueDate" />
      </div>

      <div class="modal-btns">
        <button class="btn-cancel" id="modalCancelBtn">Cancel</button>
        <button class="btn-save" id="modalSaveBtn">Add Task</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/storage.js"></script>
  <script src="js/drag.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
