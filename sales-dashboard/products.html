<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products — InsightSerenity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .stats-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.78rem;
    }
    .stat-pill-label {
      color: var(--text-muted);
      font-weight: 500;
    }
    .stat-pill-val {
      font-weight: 800;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
    }
    .controls-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .filter-select {
      padding: 0.3rem 0.65rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.4rem;
      color: var(--text);
      font-size: 0.72rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .filter-select:focus { border-color: var(--primary); }
    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.375rem 0.875rem;
      background: var(--primary);
      border: none;
      border-radius: 0.4rem;
      color: #000;
      font-size: 0.78rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-left: auto;
    }
    .btn-add:hover { opacity: 0.85; }
    .btn-action {
      padding: 0.2rem 0.5rem;
      border-radius: 0.3rem;
      font-size: 0.65rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-edit {
      background: rgba(255,196,81,0.1);
      border: 1px solid rgba(255,196,81,0.3);
      color: var(--primary);
    }
    .btn-edit:hover { background: var(--primary); color: #000; }
    .btn-archive {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: #f87171;
    }
    .btn-archive:hover { background: #f87171; color: #fff; }
    .top-performers {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      margin-top: 2rem;
    }
    .performer-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      transition: border-color 0.15s;
    }
    .performer-card:hover { border-color: rgba(255,196,81,0.3); }
    .performer-card:first-child { border-color: rgba(255,196,81,0.4); }
    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.75rem;
      height: 1.75rem;
      border-radius: 50%;
      font-size: 0.72rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
    }
    .rank-1 { background: rgba(255,196,81,0.2); color: var(--primary); }
    .rank-2 { background: rgba(148,163,184,0.15); color: #94a3b8; }
    .rank-3 { background: rgba(205,127,50,0.15); color: #cd7f32; }
    .performer-name {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.35rem;
    }
    .performer-rev {
      font-size: 1.25rem;
      font-weight: 800;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--primary);
      margin-bottom: 0.2rem;
    }
    .performer-orders {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }
    .sparkline-wrap {
      height: 36px;
      overflow: hidden;
    }
    .performers-heading {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 1rem;
    }
    @media (max-width: 900px) {
      .top-performers { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      InsightSerenity
      <span>Analytics Platform</span>
    </div>

    <div class="nav-section">Main</div>

    <a href="./" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>

    <a href="revenue" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Revenue
    </a>

    <a href="products" class="nav-item active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      Products
    </a>

    <a href="customers" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Customers
    </a>

    <div class="nav-section">Analytics</div>

    <a href="reports" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Reports
    </a>

    <div class="nav-section">System</div>

    <a href="settings" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
      Settings
    </a>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <div>
          <h1>Products</h1>
          <p>Manage and monitor your product catalog</p>
        </div>
      </div>
      <div class="topbar-right">
        <span class="live-clock" id="liveClock"></span>
        <button class="icon-btn" id="themeToggle" title="Toggle theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <a href="/" class="back-to-main">← InsightSerenity</a>
      </div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-pill">
        <span class="stat-pill-label">Total Products</span>
        <span class="stat-pill-val">10</span>
      </div>
      <div class="stat-pill">
        <span class="stat-pill-label">Active</span>
        <span class="stat-pill-val" style="color:#34d399">8</span>
      </div>
      <div class="stat-pill">
        <span class="stat-pill-label">Paused</span>
        <span class="stat-pill-val" style="color:#f87171">1</span>
      </div>
      <div class="stat-pill">
        <span class="stat-pill-label">Beta</span>
        <span class="stat-pill-val" style="color:var(--primary)">1</span>
      </div>
    </div>

    <!-- Controls Row -->
    <div class="controls-row">
      <input type="text" id="prodSearch" class="search-input-dark" placeholder="Search products..." style="width:200px" />
      <select id="statusFilter" class="filter-select">
        <option value="">All Status</option>
        <option value="Active">Active</option>
        <option value="Paused">Paused</option>
        <option value="Beta">Beta</option>
      </select>
      <button class="btn-add" id="addProductBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Product
      </button>
    </div>

    <!-- Products Table -->
    <div class="chart-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th data-sort="name">Product <span class="sort-icon">⇅</span></th>
              <th data-sort="revenue">Revenue <span class="sort-icon">⇅</span></th>
              <th data-sort="orders">Orders <span class="sort-icon">⇅</span></th>
              <th>AOV</th>
              <th data-sort="status">Status <span class="sort-icon">⇅</span></th>
              <th>Trend</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Top Performers -->
    <div style="margin-top:2rem">
      <div class="performers-heading">Top Performers</div>
      <div class="top-performers" id="topPerformers"></div>
    </div>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/products.js"></script>
</body>
</html>
