<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsightSerenity AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-logo">
        <span class="logo-icon">✦</span> InsightSerenity AI
      </div>
      <button class="new-chat-btn">+ New Conversation</button>
    </div>

    <div class="sidebar-section">Suggested Topics</div>

    <button class="suggestion-btn" data-fill="Analyze my data">
      <span class="icon">📊</span> Analyze my data
    </button>
    <button class="suggestion-btn" data-fill="Code review help">
      <span class="icon">💻</span> Code review help
    </button>
    <button class="suggestion-btn" data-fill="Career advice">
      <span class="icon">🎯</span> Career advice
    </button>
    <button class="suggestion-btn" data-fill="Bible wisdom">
      <span class="icon">✝️</span> Bible wisdom
    </button>
    <button class="suggestion-btn" data-fill="Business strategy">
      <span class="icon">📈</span> Business strategy
    </button>
    <button class="suggestion-btn" data-fill="Machine learning question">
      <span class="icon">🤖</span> ML/AI question
    </button>
    <button class="suggestion-btn" data-fill="Budget planning help">
      <span class="icon">💰</span> Budget planning
    </button>
    <button class="suggestion-btn" data-fill="Learning path for data science">
      <span class="icon">📚</span> Learning path
    </button>

    <div class="sidebar-footer">
      Powered by <a href="/" target="_blank">InsightSerenity</a>
    </div>
  </aside>

  <!-- ── Chat Area ── -->
  <main class="chat-area">
    <header class="chat-header">
      <div class="ai-avatar">IS</div>
      <div class="chat-header-info">
        <h2>InsightSerenity Assistant</h2>
        <p><span class="status-dot"></span> Online — Ready to help</p>
      </div>
      <div class="chat-header-actions">
        <button class="icon-btn" id="export-btn" title="Export chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
        <button class="icon-btn" id="clear-btn" title="Clear chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/>
            <path d="M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </button>
        <a href="/index.html" class="back-to-main">← InsightSerenity</a>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages"></div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="quick-chips">
        <button class="chip" data-send="Data Analysis with Python">📊 Data Analysis</button>
        <button class="chip" data-send="Coding help with JavaScript">💻 Coding Help</button>
        <button class="chip" data-send="Career advice and job strategy">🎯 Career</button>
        <button class="chip" data-send="Bible wisdom and scripture">✝️ Bible Wisdom</button>
      </div>
      <form id="chat-form" autocomplete="off">
        <div class="input-row">
          <textarea
            class="chat-input"
            id="chat-input"
            rows="1"
            placeholder="Ask me anything..."
            maxlength="2000"
          ></textarea>
          <button type="submit" class="send-btn" id="send-btn">
            Send
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </form>
      <div class="input-footer">
        <p class="disclaimer">AI responses are for informational purposes only.</p>
        <span class="char-counter" id="char-counter">0/2000</span>
      </div>
    </div>
  </main>

  <script src="js/responses.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
